<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आमची उत्पादने - तुळजाई हार्डवेअर</title>
    <link rel="stylesheet" href="css/style.css"><!-- तुमची CSS फाईल लिंक करा -->
</head>
<body>

    <!-- Header / Navbar तुमचा आधीचाच राहील -->

    <section class="product-section">
        <h1 class="section-title">आमची सर्व उत्पादने (Our Products)</h1>
            
        <div class="product-grid">
            
            <!-- Card 1: Drip Irrigation -->
            <div class="product-card">
                <div class="image-container">
                    <img src="images/drip-tibak.jpg" alt="Drip Irrigation">
                    <div class="icon-circle">💧</div>
                </div>
                <h3>ठिबक सिंचन<br><span>Drip Irrigation Systems</span></h3>
            </div>

            <!-- Card 2: Motor Pump -->
            <div class="product-card">
                <div class="image-container">
                    <img src="images/motor-pump.jpg" alt="Motor Pump">
                    <div class="icon-circle">⚙️</div>
                </div>
                <h3>मोटार पंप<br><span>Motor Pump & Injectors</span></h3>
            </div>

            <!-- Card 3: Sprinkler Irrigation -->
            <div class="product-card">
                <div class="image-container">
                    <img src="images/sprinkler.jpg" alt="Sprinkler">
                    <div class="icon-circle">🚿</div>
                </div>
                <h3>तुषार सिंचन<br><span>Sprinkler Irrigation</span></h3>
            </div>

            <!-- Card 4: PVC Pipes -->
            <div class="product-card">
                <div class="image-container">
                    <img src="images/pvc-pipe.jpg" alt="PVC Pipes">
                    <div class="icon-circle">⭕</div>
                </div>
                <h3>पीव्हीसी पाईप्स<br><span>PVC Pipes & Fittings</span></h3>
            </div>

            <!-- Card 5: Solvent Cement -->
            <div class="product-card">
                <div class="image-container">
                    <img src="images/solvent.jpg" alt="Solvent">
                    <div class="icon-circle">🧪</div>
                </div>
                <h3>सॉल्व्हेंट सिमेंट<br><span>PVC Pipe Solvent</span></h3>
            </div>

            <!-- Card 6: Hardware Materials -->
            <div class="product-card">
                <div class="image-container">
                    <img src="images/hardware.jpg" alt="Hardware">
                    <div class="icon-circle">🛠️</div>
                </div>
                <h3>हार्डवेअर आणि शेती साहित्य<br><span>Agricultural & Hardware Tools</span></h3>
            </div>

        </div>
    </section>

</body>
</html>
